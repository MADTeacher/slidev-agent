<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Обложка презентации</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; width: 100%; height: 100%; }
  body {
    font-family: -apple-system, "SF Pro Display", "Segoe UI", Arial, sans-serif;
    background: #f7f3ec;
    color: #111;
  }
  .slide {
    width: 1920px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    padding: 92px 112px;
    background:
      linear-gradient(90deg, rgba(17,17,17,0.08) 1px, transparent 1px) 0 0 / 120px 120px,
      linear-gradient(0deg, rgba(17,17,17,0.08) 1px, transparent 1px) 0 0 / 120px 120px,
      #f7f3ec;
  }
  .kicker {
    font-size: 28px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #6b665e;
  }
  h1 {
    margin: 180px 0 0;
    max-width: 1160px;
    font-size: 132px;
    line-height: 0.96;
    font-weight: 720;
  }
  .subtitle {
    margin-top: 48px;
    max-width: 760px;
    font-size: 34px;
    line-height: 1.32;
    color: #4f4a43;
  }
  .meta {
    position: absolute;
    left: 112px;
    right: 112px;
    bottom: 76px;
    display: flex;
    justify-content: space-between;
    font-size: 24px;
    color: #6b665e;
  }
  .mark {
    position: absolute;
    right: 118px;
    top: 140px;
    width: 500px;
    height: 500px;
  }
  .ring {
    position: absolute;
    border: 2px solid #111;
    border-radius: 50%;
  }
  .ring.a { inset: 0; }
  .ring.b { inset: 92px 26px 26px 92px; border-color: #d85d3f; }
  .block {
    position: absolute;
    right: 42px;
    bottom: 60px;
    width: 190px;
    height: 190px;
    background: #111;
  }
</style>
</head>
<body>
  <section class="slide" data-slide-validate>
    <div class="kicker">Пример обложки</div>
    <h1>Карта роста продукта на следующий квартал</h1>
    <p class="subtitle">Один сильный тезис, понятный контекст и визуальный мотив, который можно повторять дальше в презентации.</p>
    <div class="mark" aria-hidden="true">
      <div class="ring a"></div>
      <div class="ring b"></div>
      <div class="block"></div>
    </div>
    <div class="meta">
      <span>Версия для обсуждения</span>
      <span>12 слайдов · 16:9</span>
    </div>
  </section>
</body>
</html>
