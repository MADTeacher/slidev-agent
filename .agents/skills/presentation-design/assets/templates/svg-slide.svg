<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Презентационный SVG-холст</title>
  <desc id="desc">Безопасный стартовый холст 16:9 для обложки, разделителя или векторного ассета презентации.</desc>
  <defs>
    <linearGradient id="slideBackground" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.52" stop-color="#24364f"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="focusLight" cx="62%" cy="42%" r="58%">
      <stop offset="0" stop-color="#fef3c7" stop-opacity="0.8"/>
      <stop offset="0.42" stop-color="#67e8f9" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#111827" stop-opacity="0"/>
    </radialGradient>
    <pattern id="quietGrid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0V72" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="2"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18"/>
      <feOffset dx="0" dy="18" result="offsetBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.32"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g id="background">
    <rect width="1920" height="1080" fill="url(#slideBackground)"/>
    <rect width="1920" height="1080" fill="url(#quietGrid)"/>
    <rect width="1920" height="1080" fill="url(#focusLight)"/>
  </g>

  <g id="safe-title-zone" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2">
    <path d="M128 160H860"/>
    <path d="M128 244H720"/>
    <path d="M128 328H600"/>
  </g>

  <g id="key-visual-placeholder" filter="url(#softShadow)">
    <ellipse cx="1275" cy="762" rx="340" ry="64" fill="#020617" opacity="0.28"/>
    <circle cx="1275" cy="520" r="218" fill="#0f766e" opacity="0.52"/>
    <circle cx="1192" cy="456" r="92" fill="#fef3c7" opacity="0.88"/>
    <path d="M1118 690C1168 512 1372 496 1440 690Z" fill="#38bdf8" opacity="0.78"/>
    <path d="M1158 685C1206 570 1350 560 1404 685" fill="none" stroke="#ecfeff" stroke-width="14" stroke-linecap="round"/>
    <path d="M1030 360C1120 280 1282 246 1460 292" fill="none" stroke="#a7f3d0" stroke-width="10" stroke-linecap="round" opacity="0.72"/>
    <path d="M1010 830C1135 910 1375 910 1510 816" fill="none" stroke="#67e8f9" stroke-width="8" stroke-linecap="round" opacity="0.48"/>
  </g>
</svg>
